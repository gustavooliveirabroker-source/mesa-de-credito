<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta.ai · Mesa de Crédito — Protótipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== TOKENS reais do Consulta.ai (src/styles.css) ===== */
:root{
  --forest:#06231d; --deep:#0c342c; --emerald:#076653; --sage:#7e9889;
  --neon:#e3ef26; --clay:#c97e4e; --paper:#f4f6f8; --cream:#ffffff;
  --mint:#e2fbce; --hair:#e1e5ea;

  --background:#f7f8f5; --foreground:#0c1f1a;
  --card:#ffffff; --primary:var(--emerald); --primary-foreground:#fff;
  --primary-glow:#0a8a6f;
  --secondary:#eef2ee; --secondary-foreground:var(--forest);
  --muted:#eef1ee; --muted-foreground:#4a5d54;
  --accent:rgba(227,239,38,.18);
  --success:var(--emerald); --warning:#b65a26; --destructive:#c43d3d;
  --border:rgba(12,31,26,.10); --input:rgba(12,31,26,.14); --ring:var(--emerald);
  --surface:rgba(255,255,255,.62); --surface-strong:rgba(255,255,255,.78);
  --ink-soft:#4a5d54; --ink-muted:#6b7d74;
  --sidebar:rgba(255,255,255,.92); --sidebar-fg:var(--forest);
  --sidebar-primary:var(--emerald); --sidebar-primary-fg:#fff;
  --sidebar-accent:rgba(7,102,83,.08); --sidebar-border:rgba(12,31,26,.08);

  --shadow-soft:0 1px 2px rgba(12,31,26,.04),0 1px 3px rgba(12,31,26,.06);
  --shadow-glass:0 1px 3px rgba(12,31,26,.06),0 14px 34px -14px rgba(12,31,26,.16),inset 0 1px 0 rgba(255,255,255,.65);
  --shadow-elegant:0 20px 50px -20px rgba(12,31,26,.18);
  --shadow-brand:0 8px 20px -8px rgba(7,102,83,.35);
  --neon-glow:0 0 0 1px rgba(227,239,38,.55),0 0 20px rgba(227,239,38,.30);
  --gradient-primary:linear-gradient(135deg,var(--emerald) 0%,#0fa884 100%);
  --gradient-page:
    radial-gradient(60% 50% at 0% 0%,rgba(7,102,83,.11),transparent 60%),
    radial-gradient(45% 40% at 100% 0%,rgba(227,239,38,.10),transparent 62%),
    radial-gradient(55% 48% at 100% 100%,rgba(7,102,83,.09),transparent 66%),
    #f5f7f2;
  --gradient-mesh:
    radial-gradient(60% 50% at 0% 0%,rgba(7,102,83,.11),transparent 60%),
    radial-gradient(45% 40% at 100% 0%,rgba(227,239,38,.10),transparent 62%),
    radial-gradient(55% 48% at 100% 100%,rgba(7,102,83,.09),transparent 66%);
  --tsmooth:all .15s cubic-bezier(.4,0,.2,1);
}
.dark{
  --background:var(--forest); --foreground:var(--paper);
  --card:rgba(255,255,255,.045); --primary:var(--neon); --primary-foreground:var(--forest);
  --secondary:rgba(255,255,255,.06); --secondary-foreground:var(--paper);
  --muted:rgba(255,255,255,.05); --muted-foreground:#a0b8aa;
  --accent:rgba(7,102,83,.25);
  --border:rgba(255,255,255,.08); --input:rgba(255,255,255,.10); --ring:var(--neon);
  --surface:rgba(255,255,255,.045); --surface-strong:rgba(255,255,255,.07);
  --ink-soft:#a0b8aa; --ink-muted:#5a7268;
  --sidebar:rgba(4,24,26,.55); --sidebar-fg:var(--paper);
  --sidebar-primary:rgba(227,239,38,.10); --sidebar-primary-fg:var(--neon);
  --sidebar-accent:rgba(255,255,255,.06); --sidebar-border:rgba(255,255,255,.08);
  --shadow-glass:0 8px 32px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.06);
  --shadow-elegant:0 30px 60px -20px rgba(0,0,0,.65);
  --gradient-page:
    radial-gradient(60% 50% at 12% 8%,rgba(7,102,83,.55),transparent 70%),
    radial-gradient(40% 35% at 88% 22%,rgba(227,239,38,.09),transparent 65%),
    radial-gradient(55% 40% at 92% 92%,rgba(7,102,83,.65),transparent 70%),
    radial-gradient(38% 32% at 32% 90%,rgba(7,102,83,.30),transparent 72%),
    #04181a;
  --gradient-mesh:
    radial-gradient(60% 50% at 12% 8%,rgba(7,102,83,.55),transparent 70%),
    radial-gradient(40% 35% at 88% 22%,rgba(227,239,38,.09),transparent 65%),
    radial-gradient(55% 40% at 92% 92%,rgba(7,102,83,.65),transparent 70%),
    radial-gradient(38% 32% at 32% 90%,rgba(7,102,83,.30),transparent 72%);
}
*{box-sizing:border-box}
body{margin:0;font-family:'IBM Plex Sans',-apple-system,sans-serif;background:var(--gradient-page);background-attachment:fixed;color:var(--foreground);-webkit-font-smoothing:antialiased;letter-spacing:-.005em;font-feature-settings:'ss01','cv02','cv03','cv04'}
h1,h2,h3,h4,h5{letter-spacing:-.02em;font-weight:700;margin:0}
.mono,code,kbd{font-family:'IBM Plex Mono',ui-monospace,monospace}
.mesh{position:fixed;inset:0;z-index:-1;background:var(--gradient-mesh);pointer-events:none}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.tab-num{font-variant-numeric:tabular-nums}

/* ===== glass / surfaces ===== */
.glass{background:var(--surface);backdrop-filter:blur(20px) saturate(150%);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-glass)}
.glass-strong{background:var(--surface-strong);backdrop-filter:blur(20px) saturate(150%);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-glass)}
.glass-hover{transition:var(--tsmooth)}
.glass-hover:hover{border-color:rgba(7,102,83,.25);box-shadow:0 2px 4px rgba(12,31,26,.06),0 12px 32px -8px rgba(12,31,26,.14)}
.dark .glass-hover:hover{border-color:rgba(255,255,255,.14)}
.surface-card{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow-soft);border-radius:14px}

/* ===== typography ===== */
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);display:inline-flex;align-items:center;gap:6px}
.muted{color:var(--muted-foreground)}
.sub{font-size:14px;color:var(--muted-foreground)}

/* ===== buttons ===== */
.btn-neon{background:var(--neon);color:var(--forest);border-radius:99px;padding:9px 18px;font-weight:700;font-size:12.5px;letter-spacing:-.01em;box-shadow:var(--neon-glow);transition:var(--tsmooth);display:inline-flex;align-items:center;gap:6px}
.btn-neon:hover{transform:translateY(-1px)}
.btn-primary{background:var(--gradient-primary);color:#fff;border-radius:12px;padding:10px 18px;font-weight:600;font-size:13px;box-shadow:var(--shadow-brand);display:inline-flex;align-items:center;gap:6px;transition:var(--tsmooth)}
.btn-primary:hover{opacity:.95}
.btn-outline{border:1px solid var(--border);background:var(--card);border-radius:99px;padding:8px 16px;font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:6px;transition:var(--tsmooth);color:var(--foreground)}
.btn-outline:hover{background:var(--accent)}
.btn-em{border:1px solid rgba(7,102,83,.4);border-radius:12px;padding:8px 16px;font-weight:700;font-size:12px;color:var(--emerald);display:inline-flex;align-items:center;gap:6px}
.dark .btn-em{border-color:rgba(226,251,206,.3);color:var(--mint)}
.btn-em:hover{background:rgba(7,102,83,.1)}

/* ===== pills / status ===== */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.01em}
.s-ok{background:rgba(7,102,83,.14);color:var(--emerald)} .dark .s-ok{color:var(--mint)}
.s-warn{background:rgba(217,152,60,.16);color:#b6702a} .dark .s-warn{color:#f0b56a}
.s-info{background:rgba(59,130,246,.15);color:#2f74d0} .dark .s-info{color:#7ab6ff}
.s-bad{background:rgba(196,61,61,.15);color:var(--destructive)} .dark .s-bad{color:#f08a8a}
.s-muted{background:var(--muted);color:var(--muted-foreground)}
.s-viol{background:rgba(183,140,255,.16);color:#8256d6} .dark .s-viol{color:#c3a8ff}

/* risco badges */
.rk{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:11px;padding:3px 10px;border-radius:8px}
.rk .d{width:8px;height:8px;border-radius:50%}
.rk-x{background:rgba(7,102,83,.14);color:var(--emerald)} .rk-x .d{background:var(--emerald)} .dark .rk-x{color:var(--mint)}
.rk-y{background:rgba(217,152,60,.16);color:#b6702a} .rk-y .d{background:#d9983c} .dark .rk-y{color:#f0b56a}
.rk-z{background:rgba(196,61,61,.15);color:var(--destructive)} .rk-z .d{background:var(--destructive)} .dark .rk-z{color:#f08a8a}
.rk-bk{background:rgba(90,110,120,.16);color:#5b6e78} .rk-bk .d{background:#8fa2ac} .dark .rk-bk{color:#b9cdd6}

/* module badge */
.mbadge{display:inline-flex;align-items:center;gap:4px;border-radius:99px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;font-size:9.5px}
.mb-sell{background:var(--emerald);color:var(--paper)} .dark .mb-sell{background:var(--neon);color:var(--forest)}
.mb-prem{background:var(--forest);color:var(--neon);box-shadow:inset 0 0 0 1px rgba(227,239,38,.3)}
.mb-new{background:var(--mint);color:var(--emerald)}

/* ===== app shell ===== */
.shell{display:flex;min-height:100vh}
aside.side{width:230px;flex:none;display:none;flex-direction:column;border-right:1px solid var(--sidebar-border);background:var(--sidebar);backdrop-filter:blur(28px);position:sticky;top:0;height:100vh;overflow-y:auto}
@media(min-width:1024px){aside.side{display:flex}}
.brand{display:flex;align-items:center;gap:10px;justify-content:center;padding:18px 14px 12px}
.brand .logo{width:30px;height:30px;border-radius:9px;background:var(--gradient-primary);display:grid;place-items:center;color:#fff;font-weight:700;font-family:'IBM Plex Mono';font-size:15px;box-shadow:var(--shadow-brand)}
.dark .brand .logo{background:var(--neon);color:var(--forest)}
.brand b{font-size:15px;font-weight:700} .brand small{display:block;font-size:9.5px;color:var(--muted-foreground);font-family:'IBM Plex Mono';letter-spacing:.1em;text-transform:uppercase}

.saldo{margin:4px 12px 10px;border:1px solid var(--border);background:var(--surface-strong);border-radius:16px;padding:14px;backdrop-filter:blur(12px)}
.saldo .top{display:flex;align-items:center;justify-content:between;gap:8px;justify-content:space-between}
.saldo .val{margin-top:3px;font-family:'IBM Plex Mono';font-size:23px;font-weight:700;letter-spacing:-.02em}
.saldo .btn-neon{margin-top:10px;width:100%;justify-content:center}

.nav{padding:4px 10px 20px;flex:1}
.nav .sec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--muted-foreground);opacity:.7;padding:14px 10px 6px}
.nav a{display:flex;align-items:center;gap:11px;border-radius:10px;padding:9px 11px;font-size:13px;font-weight:500;color:var(--sidebar-fg);transition:var(--tsmooth);margin-bottom:1px}
.nav a:hover{background:var(--sidebar-accent)}
.nav a.on{background:var(--sidebar-primary);color:var(--sidebar-primary-fg);font-weight:600;box-shadow:var(--neon-glow)}
.dark .nav a.on{box-shadow:none}
.nav a svg{width:16px;height:16px;flex:none}
.nav a .cnt{margin-left:auto;font-size:10px;font-family:'IBM Plex Mono';background:var(--muted);color:var(--muted-foreground);border-radius:99px;padding:1px 7px;font-weight:600}
.nav a.on .cnt{background:rgba(255,255,255,.25);color:#fff}
.dark .nav a.on .cnt{background:rgba(227,239,38,.2);color:var(--neon)}
.side-foot{border-top:1px solid var(--sidebar-border);padding:12px 16px;font-size:12px}
.side-foot .u{font-weight:600} .side-foot .e{color:var(--muted-foreground);font-size:11px}

main.main{flex:1;min-width:0;display:flex;flex-direction:column}
header.top{position:sticky;top:0;z-index:30;min-height:60px;display:flex;align-items:center;gap:14px;padding:10px 22px;background:var(--surface);backdrop-filter:blur(28px);border-bottom:1px solid var(--border)}
header .burger{display:grid;place-items:center;width:38px;height:38px;border-radius:10px;border:1px solid var(--border)}
@media(min-width:1024px){header .burger{display:none}}
header .ttl .eyebrow{margin-bottom:1px}
header .ttl h1{font-size:16px}
.hsearch{flex:1;max-width:420px;margin:0 auto;display:none;align-items:center;gap:8px;border:1px solid var(--border);background:var(--surface-strong);border-radius:99px;padding:8px 16px;backdrop-filter:blur(12px)}
@media(min-width:768px){.hsearch{display:flex}}
.hsearch input{flex:1;background:none;border:none;outline:none;font-size:13px;color:inherit;font-family:inherit}
.hsearch input::placeholder{color:var(--muted-foreground)}
.hsearch kbd{font-size:10px;color:var(--muted-foreground);letter-spacing:.05em}
.hright{margin-left:auto;display:flex;align-items:center;gap:10px}
.iconbtn{width:38px;height:38px;border-radius:99px;display:grid;place-items:center;border:1px solid var(--border);background:var(--card);transition:var(--tsmooth)}
.iconbtn:hover{background:var(--accent)}
.iconbtn svg{width:18px;height:18px}
.avatar{width:38px;height:38px;border-radius:99px;display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--forest);background:var(--gradient-primary)}
.dark .avatar{color:#fff}

.content{padding:26px 22px 60px;max-width:1200px;width:100%;margin:0 auto}
.screen{display:none;animation:rise .42s cubic-bezier(.22,1,.36,1) both}
.screen.active{display:block}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ===== reusable blocks ===== */
.page-h{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.page-h h2{font-size:24px}
.page-h .sub{margin-top:4px}

.grid{display:grid;gap:14px}
.k4{grid-template-columns:repeat(2,1fr)} @media(min-width:900px){.k4{grid-template-columns:repeat(4,1fr)}}
.k3{grid-template-columns:1fr} @media(min-width:820px){.k3{grid-template-columns:repeat(3,1fr)}}
.k2{grid-template-columns:1fr} @media(min-width:820px){.k2{grid-template-columns:1fr 1fr}}
.c2{grid-template-columns:1fr} @media(min-width:940px){.c2{grid-template-columns:1.4fr 1fr}}

.kpi{position:relative;overflow:hidden;border-radius:16px;padding:18px}
.kpi .row{display:flex;align-items:center;gap:8px}
.kpi .ic{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;background:rgba(7,102,83,.1);color:var(--emerald)}
.dark .kpi .ic{color:var(--mint)}
.kpi .ic svg{width:15px;height:15px}
.kpi .v{margin-top:12px;font-size:27px;font-weight:700;letter-spacing:-.02em}
.kpi .delta{font-size:11.5px;font-weight:600;margin-top:3px;display:inline-flex;align-items:center;gap:3px}
.kpi .halo{position:absolute;right:-24px;top:-24px;width:80px;height:80px;border-radius:50%;background:rgba(227,239,38,.2);filter:blur(28px)}

.panel{border-radius:20px;padding:20px}
.panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.panel-h h3{font-size:15px}

/* table */
.tbl-wrap{border-radius:18px;overflow:hidden}
table.t{width:100%;border-collapse:collapse;font-size:13px}
table.t thead{background:var(--muted);border-bottom:1px solid var(--border)}
table.t th{text-align:left;padding:10px 16px;font-family:'IBM Plex Mono';font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.13em;color:var(--muted-foreground)}
table.t td{padding:11px 16px;border-top:1px solid var(--border)}
table.t tbody tr{transition:var(--tsmooth)}
table.t tbody tr:hover{background:rgba(7,102,83,.05)}
.dark table.t tbody tr:hover{background:rgba(255,255,255,.03)}
table.t td.co b{font-weight:600} table.t td.co small{display:block;font-size:11px;color:var(--muted-foreground);font-family:'IBM Plex Mono'}
.tright{text-align:right} .mono-v{font-family:'IBM Plex Mono';font-weight:600}

/* bars */
.bar{height:8px;border-radius:99px;background:var(--muted);overflow:hidden}
.bar > span{display:block;height:100%;border-radius:99px;background:var(--gradient-primary)}
.dark .bar > span{background:var(--neon)}
.bar.neon > span{background:var(--neon)}

/* chart bars */
.chart{display:flex;align-items:flex-end;gap:6px;height:120px}
.chart .b{flex:1;border-radius:5px 5px 0 0;background:var(--gradient-primary);opacity:.9;min-height:4px;position:relative}
.dark .chart .b{background:linear-gradient(180deg,var(--neon),rgba(227,239,38,.35))}
.chart .b.hl{background:var(--neon)}
.axis{display:flex;justify-content:space-between;margin-top:8px;font-size:9.5px;color:var(--muted-foreground);font-family:'IBM Plex Mono'}

/* donut */
.donut{--p:63;width:120px;height:120px;border-radius:50%;background:conic-gradient(var(--emerald) calc(var(--p)*1%),var(--muted) 0);display:grid;place-items:center}
.dark .donut{background:conic-gradient(var(--neon) calc(var(--p)*1%),rgba(255,255,255,.08) 0)}
.donut .hole{width:84px;height:84px;border-radius:50%;background:var(--card);display:grid;place-items:center;text-align:center;box-shadow:var(--shadow-soft)}
.dark .donut .hole{background:var(--forest)}
.donut .hole b{font-size:22px;display:block} .donut .hole small{font-size:10px;color:var(--muted-foreground)}

/* stepper */
.stepper{display:flex;gap:0;margin-bottom:22px;overflow-x:auto}
.stp{flex:1;min-width:130px;display:flex;flex-direction:column;gap:8px;padding-right:8px}
.stp .n{width:28px;height:28px;border-radius:99px;display:grid;place-items:center;font-size:12px;font-weight:700;border:1px solid var(--border);background:var(--card)}
.stp.done .n{background:var(--emerald);color:#fff;border-color:transparent} .dark .stp.done .n{background:var(--neon);color:var(--forest)}
.stp.cur .n{border-color:var(--emerald);color:var(--emerald)} .dark .stp.cur .n{border-color:var(--neon);color:var(--neon)}
.stp .lb{font-size:12px;font-weight:600} .stp .lb small{display:block;font-weight:400;color:var(--muted-foreground);font-size:11px}
.stp .line{height:2px;background:var(--border);border-radius:2px}
.stp.done .line{background:var(--emerald)} .dark .stp.done .line{background:var(--neon)}

/* form */
.field{margin-bottom:14px} .field label{display:block;font-size:12px;font-weight:600;margin-bottom:6px}
.field input,.field select{width:100%;border:1px solid var(--input);background:var(--card);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:inherit;outline:none;transition:var(--tsmooth)}
.field input:focus{border-color:var(--emerald);box-shadow:0 0 0 3px rgba(7,102,83,.12)}
.frow{display:grid;gap:14px;grid-template-columns:1fr 1fr}

/* kanban */
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px}
.col{flex:none;width:250px;background:var(--surface-strong);border:1px solid var(--border);border-radius:16px;padding:10px}
.col .ch{display:flex;align-items:center;justify-content:space-between;padding:6px 6px 10px;font-size:12px;font-weight:700}
.col .ch .tag{width:8px;height:8px;border-radius:99px;margin-right:6px;display:inline-block}
.col .ch .cnt{font-family:'IBM Plex Mono';font-size:10px;color:var(--muted-foreground);background:var(--muted);border-radius:99px;padding:1px 7px}
.kcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:9px;box-shadow:var(--shadow-soft);transition:var(--tsmooth);cursor:pointer}
.kcard:hover{border-color:rgba(7,102,83,.3);transform:translateY(-2px);box-shadow:var(--shadow-elegant)}
.kcard .en{font-size:12.5px;font-weight:600} .kcard .cn{font-size:10.5px;color:var(--muted-foreground);font-family:'IBM Plex Mono';margin-top:1px}
.kcard .mid{display:flex;align-items:center;justify-content:space-between;margin:9px 0 8px}
.kcard .vl{font-family:'IBM Plex Mono';font-weight:700;font-size:13px}
.kcard .ft{display:flex;align-items:center;justify-content:space-between;font-size:10.5px;color:var(--muted-foreground)}
.kcard .who{display:flex;align-items:center;gap:5px}
.kcard .ini{width:18px;height:18px;border-radius:99px;background:var(--gradient-primary);color:#fff;display:grid;place-items:center;font-size:8px;font-weight:700}

/* consulta rows */
.crow{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--border)}
.crow:first-child{border-top:none}
.crow .ci{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:none}
.crow .ci svg{width:16px;height:16px}
.ci-ok{background:rgba(7,102,83,.13);color:var(--emerald)} .dark .ci-ok{color:var(--mint)}
.ci-warn{background:rgba(217,152,60,.16);color:#b6702a} .dark .ci-warn{color:#f0b56a}
.ci-bad{background:rgba(196,61,61,.14);color:var(--destructive)} .dark .ci-bad{color:#f08a8a}
.crow .cc{flex:1} .crow .cc b{font-size:13px;font-weight:600} .crow .cc small{display:block;font-size:11.5px;color:var(--muted-foreground)}

/* vote */
.vote-opt{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.vopt{border:1px solid var(--border);border-radius:10px;padding:8px 13px;font-size:12px;font-weight:600;transition:var(--tsmooth)}
.vopt:hover{border-color:var(--emerald);background:rgba(7,102,83,.06)}
.vopt.ok:hover{border-color:var(--emerald)} .vopt.bad:hover{border-color:var(--destructive);background:rgba(196,61,61,.06)}
.voter{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--border)}
.voter:first-child{border:none}
.voter .ini{width:30px;height:30px;border-radius:99px;background:var(--gradient-primary);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700;flex:none}

/* reco compare */
.rc{margin:12px 0}
.rc .lb{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.rc .track{height:22px;border-radius:8px;background:var(--muted);overflow:hidden}
.rc .fill{height:100%;display:flex;align-items:center;padding-left:10px;font-family:'IBM Plex Mono';font-size:11px;font-weight:700;color:#fff}
.fill-req{background:linear-gradient(90deg,rgba(217,152,60,.7),#d9983c);color:#3a2a10}
.fill-rec{background:var(--gradient-primary)}
.dark .fill-rec{background:var(--neon);color:var(--forest)}

/* misc lists */
.flist > div{display:flex;gap:10px;padding:9px 0;border-top:1px solid var(--border);font-size:13px;align-items:flex-start}
.flist > div:first-child{border:none}
.dot-ok{width:7px;height:7px;border-radius:99px;background:var(--emerald);margin-top:6px;flex:none}
.dot-bad{width:7px;height:7px;border-radius:99px;background:var(--destructive);margin-top:6px;flex:none}

/* network (grupo economico) */
.net{position:relative;height:260px;display:grid;place-items:center}
.node{position:absolute;border:1px solid var(--border);background:var(--card);border-radius:12px;padding:8px 12px;font-size:11px;text-align:center;box-shadow:var(--shadow-soft)}
.node b{font-size:11.5px;display:block} .node small{font-size:9.5px;color:var(--muted-foreground);font-family:'IBM Plex Mono'}
.node.center{background:var(--gradient-primary);color:#fff;border:none;box-shadow:var(--shadow-brand);z-index:2}
.dark .node.center{background:var(--neon);color:var(--forest)}
.node.center small{color:rgba(255,255,255,.8)} .dark .node.center small{color:rgba(6,35,29,.7)}

/* integ cards */
.igrid{display:grid;gap:12px;grid-template-columns:1fr} @media(min-width:760px){.igrid{grid-template-columns:repeat(3,1fr)}}
.icard{border:1px solid var(--border);border-radius:14px;padding:16px;background:var(--card)}
.icard .ih{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.icard .lg{width:34px;height:34px;border-radius:9px;background:var(--muted);display:grid;place-items:center;font-weight:700;font-size:13px;font-family:'IBM Plex Mono'}

.hidden{display:none}
.m-hide{display:none}@media(min-width:600px){.m-hide{display:table-cell}}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-size:11.5px;padding:5px 11px;border-radius:99px;background:var(--muted);color:var(--muted-foreground)}
.divider{height:1px;background:var(--border);margin:16px 0}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ===== tabs ===== */
.tabhost{margin-top:2px}
.tabbar{display:flex;gap:4px;overflow-x:auto;border:1px solid var(--border);background:var(--surface-strong);border-radius:14px;padding:4px;margin-bottom:16px;backdrop-filter:blur(12px)}
.tab{flex:none;padding:8px 14px;border-radius:10px;font-size:12.5px;font-weight:600;color:var(--muted-foreground);white-space:nowrap;transition:var(--tsmooth)}
.tab:hover{color:var(--foreground)}
.tab.active{background:var(--card);color:var(--emerald);box-shadow:var(--shadow-soft)}
.dark .tab.active{color:var(--neon);background:rgba(255,255,255,.06)}
.tabpane{display:none;animation:rise .3s ease both}
.tabpane.active{display:block}

/* ===== score gauge ===== */
.gauge{position:relative;width:118px;height:118px;flex:none}
.gauge .ring{width:118px;height:118px;border-radius:50%;background:conic-gradient(var(--gcol,var(--emerald)) calc(var(--gp,74)*1%),var(--muted) 0)}
.gauge .hole{position:absolute;inset:11px;border-radius:50%;background:var(--card);display:grid;place-items:center;text-align:center;box-shadow:var(--shadow-soft)}
.dark .gauge .hole{background:var(--forest)}
.gauge .hole b{font-size:26px;font-family:'IBM Plex Mono';line-height:1}
.gauge .hole small{font-size:9px;color:var(--muted-foreground);text-transform:uppercase;letter-spacing:.1em}

/* ===== strip ===== */
.strip{display:flex;gap:16px;flex-wrap:wrap;align-items:center;padding:18px 20px;border-radius:18px}
.strip .sv{flex:1;min-width:120px}
.strip .sv .n{font-size:20px;font-weight:700;margin-top:3px;font-family:'IBM Plex Mono'}

/* ===== docs ===== */
.doc{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--border)}
.doc:first-of-type{border:none}
.doc .di{width:36px;height:36px;border-radius:9px;background:var(--muted);display:grid;place-items:center;flex:none;color:var(--emerald)}
.dark .doc .di{color:var(--mint)}
.doc .di svg{width:17px;height:17px}
.doc .dc{flex:1}.doc .dc b{font-size:13px}.doc .dc small{display:block;font-size:11px;color:var(--muted-foreground);font-family:'IBM Plex Mono'}

/* ===== consulta rich cards ===== */
.cq{display:grid;gap:12px;grid-template-columns:1fr}@media(min-width:720px){.cq{grid-template-columns:1fr 1fr}}
.cqc{border:1px solid var(--border);border-radius:14px;padding:16px;background:var(--card)}
.cqc .cqh{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cqc .cqi{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:none}
.cqc .cqi svg{width:16px;height:16px}
.cqc .cqt{font-size:13.5px;font-weight:700} .cqc .cqt small{display:block;font-weight:400;font-size:11px;color:var(--muted-foreground)}
.cqrow{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-top:1px dashed var(--border)}
.cqrow b{font-family:'IBM Plex Mono';font-weight:600}

/* ===== trend card ===== */
.tc{border:1px solid var(--border);border-radius:12px;padding:13px;background:var(--card)}
.tc .v{font-size:18px;font-weight:700;margin-top:4px;font-family:'IBM Plex Mono'}
.tc .t{font-size:11px;font-weight:600;margin-top:2px;display:inline-flex;align-items:center;gap:3px}
.tc .t svg{width:12px;height:12px}

/* ===== timeline ===== */
.tl{position:relative;padding-left:22px}
.tl::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border)}
.tli{position:relative;padding:0 0 16px}
.tli:last-child{padding-bottom:0}
.tli::before{content:"";position:absolute;left:-21px;top:3px;width:11px;height:11px;border-radius:50%;background:var(--emerald);box-shadow:0 0 0 3px var(--card)}
.dark .tli::before{background:var(--neon);box-shadow:0 0 0 3px var(--forest)}
.tli.bad::before{background:var(--destructive)}

/* ===== modal ===== */
.modal-scrim{position:fixed;inset:0;background:rgba(6,35,29,.55);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-scrim.show{display:flex}
.modal{width:100%;max-width:560px;max-height:86vh;overflow-y:auto;border-radius:20px;background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow-elegant);animation:rise .3s ease both}
.dark .modal{background:#0a2722}
.modal .mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:inherit;z-index:1}
.modal .mh h3{font-size:16px}.modal .mb{padding:20px}
.mclose{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;border:1px solid var(--border)}
.mclose svg{width:16px;height:16px}

/* ===== vote detail ===== */
.vopt.sel{border-color:var(--emerald);background:rgba(7,102,83,.08);color:var(--emerald)}
.dark .vopt.sel{border-color:var(--neon);color:var(--neon)}
.vdetail{border:1px solid var(--emerald);border-radius:12px;padding:14px;margin-top:14px;background:rgba(7,102,83,.04);display:none}
.dark .vdetail{border-color:rgba(226,251,206,.3)}
.vdetail.show{display:block}
.txta{width:100%;border:1px solid var(--input);background:var(--card);border-radius:10px;padding:10px;font-family:inherit;font-size:13px;color:inherit;resize:vertical;min-height:64px;outline:none}
.txta:focus{border-color:var(--emerald)}

input[type=range]{accent-color:var(--emerald);height:6px;cursor:pointer}
.dark input[type=range]{accent-color:var(--neon)}
.dark .dark-mint{color:var(--mint)!important}

/* drawer mobile */
.scrim{position:fixed;inset:0;background:rgba(6,35,29,.6);backdrop-filter:blur(4px);z-index:40;display:none}
.scrim.show{display:block}
@media(min-width:1024px){.scrim,.drawer{display:none!important}}
</style>

S.monitoramento=()=>`
<div class="page-h"><div><div class="eyebrow">${svg('radar')} Vigilância</div><h2>Monitoramento</h2><p class="sub">Eventos da carteira monitorada · ações configuráveis por alerta.</p></div><button class="btn-outline">${svg('sliders')} Regras de alerta</button></div>
<div class="glass panel">
  ${evt('bad','Novo protesto','Metalúrgica Horizonte · R$ 34.500 · Cartório 2º Ofício','há 2h','Bloquear novas vendas')}
  ${evt('warn','Queda de score','AgroPrime Insumos · 712 → 648 (-64)','há 5h','Solicitar reanálise')}
  ${evt('warn','Troca de sócio','Frigorífico Serra Azul · saída de sócio (30%)','ontem','Encaminhar ao comitê')}
  ${evt('ok','Limite renovado','Comercial São Bento · +12 meses','ontem','Apenas comunicar')}
  ${evt('bad','Atraso registrado','Móveis Bem Estar · parcela 4 · 6 dias','2 dias','Reduzir limite')}
</div>`;
function evt(t,tt,d,when,act){const m={ok:['ci-ok','check'],warn:['ci-warn','alert'],bad:['ci-bad','alert']};const[ci,ic]=m[t];const sc=t=='ok'?'s-ok':t=='warn'?'s-warn':'s-bad';return `<div class="crow"><span class="ci ${ci}">${svg(ic)}</span><div class="cc"><b>${tt}</b><small>${d}</small></div><div style="text-align:right"><div class="pill ${sc}" style="margin-bottom:4px">${act}</div><div class="sub mono" style="font-size:10.5px">${when}</div></div></div>`}

/* ---- POLÍTICAS ---- */
S.politicas=()=>`
<div class="page-h"><div><div class="eyebrow">${svg('sliders')} Motor de decisão</div><h2>Políticas de Crédito</h2><p class="sub">A empresa escreve a regra, o motor aplica. Sem programação.</p></div><button class="btn-neon">${svg('plus')} Nova regra</button></div>
<div class="grid c2">
  <div class="glass panel">
    <div class="panel-h"><h3>Regras ativas</h3><span class="pill s-ok">18 regras</span></div>
    ${rule('CNPJ inapto ou baixado','bloqueio','s-bad')}
    ${rule('Recuperação judicial ativa','bloqueio','s-bad')}
    ${rule('Score < 550','bloqueio','s-bad')}
    ${rule('Processo judicial > R$ 15k','alerta','s-warn')}
    ${rule('Faturamento em queda > 20%','alerta','s-warn')}
    ${rule('Limite acima do teto do cliente','exceção','s-info')}
    ${rule('Prazo > 12 meses','exceção','s-info')}
  </div>
  <div>
    <div class="glass panel" style="margin-bottom:14px">
      <div class="panel-h"><h3>Editor de regra</h3></div>
      <div class="field"><label>Critério</label><select><option>Dívida / EBITDA</option><option>Score</option><option>Faturamento mínimo</option></select></div>
      <div class="frow"><div class="field"><label>Operador</label><select><option>maior que</option><option>menor que</option></select></div><div class="field"><label>Valor</label><input value="3,0x"></div></div>
      <div class="field"><label>Resultado</label><select><option>Alerta — exige justificativa</option><option>Bloqueio — impede</option><option>Exceção — alçada superior</option></select></div>
      <button class="btn-primary" style="width:100%;justify-content:center">Salvar regra</button>
    </div>
    <div class="glass panel">
      <div class="panel-h"><h3>Faixas de risco → alçada</h3></div>
      ${faixa('X','baixo','rk-x','N1')}${faixa('Y','moderado','rk-y','N1 + N2')}${faixa('Z','elevado','rk-z','N1 + N2 + N3')}${faixa('B','bloqueado','rk-bk','Admin')}
    </div>
  </div>
</div>`;
function rule(t,tp,sc){return `<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-top:1px solid var(--border)"><div style="font-size:13px;font-weight:500">${t}</div><div style="display:flex;gap:8px;align-items:center"><span class="pill ${sc}">${tp}</span><span style="width:34px;height:20px;border-radius:99px;background:var(--emerald);position:relative;flex:none"><span style="position:absolute;width:16px;height:16px;border-radius:99px;background:#fff;top:2px;right:2px"></span></span></div></div>`}
function faixa(l,d,rk,al){return `<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:1px solid var(--border)"><span class="rk ${rk}"><span class="d"></span>Risco ${l} · ${d}</span><span class="mono" style="font-size:12px;font-weight:600">${al}</span></div>`}

        <div class="chips" style="margin-top:14px"><span class="chip">Entrada 20%</span><span class="chip">Avalista</span><span class="chip">Prazo 6m</span><span class="chip">Revisão 90d</span><span class="chip">Bloqueio em atraso</span></div>
      </div>
      <div class="glass panel">
        <div class="panel-h"><h3 style="font-size:15px">Precificação por risco</h3><span class="pill s-ok">faixa Y</span></div>
        <div class="grid" style="grid-template-columns:1fr 1fr;gap:10px">${mini('Taxa sugerida','2,4% a.m.')}${mini('CET','32,9% a.a.')}${mini('Parcela 90k/6m','R$ 16.100')}${mini('Spread de risco','+0,9pp')}</div>
        <p class="sub" style="font-size:12px;margin-top:10px">A taxa acompanha a faixa: X 1,8% · Y 2,4% · Z 3,2% a.m. Melhor score/garantia → menor spread.</p>
      </div>
    </div>
  </div>

  <div class="tabpane" data-pane="comite">
    <div class="glass panel" style="margin-bottom:14px">
      <div class="panel-h"><h3>${svg('gavel')} Comitê · quórum 2/2</h3><span class="pill s-info">1/2 votos</span></div>
      <div class="voter"><span class="ini">AL</span><div style="flex:1"><b style="font-size:13px">Ana Lima · N1</b><div class="sub" style="font-size:11.5px">Aprovou com condições · 13/07 14:32</div><div style="font-size:12px;margin-top:5px;padding:8px 10px;background:var(--muted);border-radius:8px">"De acordo com a redução para R$ 90k e prazo de 6 meses. Exigir avalista e revisão em 90 dias."</div></div><span class="pill s-ok">${svg('check')} Aprovou</span></div>
      <div class="voter"><span class="ini" style="background:var(--muted);color:var(--muted-foreground)">GO</span><div style="flex:1"><b style="font-size:13px">Gustavo O. · N2</b><div class="sub" style="font-size:11.5px">Aguardando seu voto · SLA 6h</div></div><span class="pill s-warn">${svg('clock')} Pendente</span></div>
    </div>
    <div class="glass panel">
      <div class="eyebrow">Seu voto (N2)</div>
      <div class="vote-opt">
        <button class="vopt ok" onclick="voteSelect(this,'Aprovar')">${svg('check')} Aprovar</button>
        <button class="vopt" onclick="voteSelect(this,'Aprovar com condições')">Aprovar c/ condições</button>
        <button class="vopt" onclick="voteSelect(this,'Reduzir valor')">Reduzir valor</button>
        <button class="vopt" onclick="voteSelect(this,'Reduzir prazo')">Reduzir prazo</button>
        <button class="vopt" onclick="voteSelect(this,'Solicitar garantia')">Solicitar garantia</button>
        <button class="vopt" onclick="voteSelect(this,'Devolver ao analista')">Devolver</button>
        <button class="vopt bad" onclick="voteSelect(this,'Reprovar')">${svg('x')} Reprovar</button>
      </div>
      <div class="vdetail" id="vdetail">
        <div class="eyebrow">Detalhar voto: <b id="vlabel" style="color:var(--emerald)"></b></div>
        <div class="frow" style="margin-top:10px"><div class="field" style="margin:0"><label>Valor aprovado</label><input value="R$ 90.000"></div><div class="field" style="margin:0"><label>Prazo aprovado</label><input value="6 meses"></div></div>
        <div class="field" style="margin:12px 0 8px"><label>Condições</label><div class="chips"><span class="chip">Entrada 20%</span><span class="chip">Avalista</span><span class="chip">Revisão 90d</span><span class="chip">+ condição</span></div></div>
        <div class="field" style="margin:0"><label>Justificativa do voto</label><textarea class="txta" placeholder="Descreva o racional da sua decisão…"></textarea></div>
        <div style="display:flex;gap:8px;margin-top:12px"><button class="btn-neon" onclick="voteConfirm()">Registrar voto</button><button class="btn-outline" onclick="document.getElementById('vdetail').classList.remove('show')">Cancelar</button></div>
      </div>
      <div style="margin-top:14px;padding:12px;background:var(--muted);border-radius:10px;font-size:12px;display:flex;gap:10px"><span style="color:var(--emerald);flex:none">${svg('info')}</span><div><b>Comitê assíncrono:</b> aprovadores votam por link com SLA. Se o N2 não votar em 6h, escala para N3 automaticamente.</div></div>
    </div>
  </div>
</div>`;

/* ---- SIMULADOR ---- */
S.simulador=()=>`
<div class="page-h"><div><div class="eyebrow">${svg('calc')} Pré-análise</div><h2>Simulador de Crédito</h2><p class="sub">Teste valor, prazo e entrada e veja a faixa de risco e a taxa antes de abrir a proposta.</p></div></div>
<div class="grid c2">
  <div class="glass panel">
    <div class="panel-h"><h3>Parâmetros</h3></div>
    <div class="field"><label>Valor da operação · <b id="sim_valor_l">R$ 150.000</b></label><input id="sim_valor" type="range" min="10000" max="1000000" step="10000" value="150000" oninput="simCalc()" style="width:100%"></div>
    <div class="field"><label>Prazo · <b id="sim_prazo_l">12 meses</b></label><input id="sim_prazo" type="range" min="3" max="36" step="1" value="12" oninput="simCalc()" style="width:100%"></div>
    <div class="field"><label>Entrada · <b id="sim_entrada_l">20%</b></label><input id="sim_entrada" type="range" min="0" max="50" step="5" value="20" oninput="simCalc()" style="width:100%"></div>
    <div style="padding:12px;background:var(--muted);border-radius:10px;font-size:12.5px;margin-top:6px">Valor financiado: <b id="sim_fin" class="mono">R$ 120.000</b></div>
  </div>
  <div class="glass panel">
    <div class="panel-h"><h3>Resultado</h3><span class="eyebrow">estimativa</span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><span class="muted">Faixa de risco</span><span id="sim_faixa">${riskBadge('Y')}</span></div>
    <div class="grid" style="grid-template-columns:1fr 1fr;gap:10px">
      <div class="tc"><div class="eyebrow" style="font-size:9px">Limite recomendado</div><div class="v" id="sim_limite">R$ 300.000</div></div>
      <div class="tc"><div class="eyebrow" style="font-size:9px">Taxa sugerida</div><div class="v" id="sim_taxa" style="color:var(--emerald)">2,4% a.m.</div></div>
      <div class="tc"><div class="eyebrow" style="font-size:9px">Parcela estimada</div><div class="v" id="sim_parcela">R$ 11.400</div></div>
      <div class="tc"><div class="eyebrow" style="font-size:9px">Comprometimento</div><div class="v" id="sim_comp">34%</div></div>
    </div>
    <div class="bar" style="margin-top:14px"><span id="sim_bar" style="width:34%"></span></div>
    <button class="btn-neon" style="margin-top:16px" data-go="nova">${svg('arrow')} Abrir proposta com estes parâmetros</button>
  </div>
</div>`;

/* ===== ROUTER ===== */
const content=document.getElementById('content'),ptitle=document.getElementById('ptitle');
const EXTRA={clientePerfil:'Histórico do Cliente'};
function go(id){
 const item=NAV.find(n=>n.id===id)||{id,t:EXTRA[id]||id};
 content.innerHTML=(S[id]||(()=>`<div class="glass panel"><h2>${item.t}</h2><p class="sub">Tela em construção no protótipo.</p></div>`))();
 ptitle.textContent=item.t;
 document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('on',a.dataset.go===id));
 content.querySelectorAll('[data-ic]').forEach(e=>{if(!e.querySelector('svg'))e.insertAdjacentHTML('afterbegin',svg(e.dataset.ic))});
 if(id==='simulador')simCalc();
 window.scrollTo(0,0); toggleDrawer(false);
}
document.addEventListener('click',e=>{const g=e.target.closest('[data-go]');if(g){e.preventDefault();go(g.dataset.go)}});
function toggleTheme(){const d=document.documentElement.classList.toggle('dark');const b=document.getElementById('themeBtn');b.innerHTML=svg(d?'sun':'moon')}
function toggleDrawer(open){const s=document.getElementById('side'),sc=document.getElementById('scrim');if(window.innerWidth>=1024)return;if(open){s.style.display='flex';s.style.position='fixed';s.style.zIndex='50';s.style.height='100vh';sc.classList.add('show')}else{s.style.display='';s.style.position='';sc.classList.remove('show')}}
go('visao');
</script>
